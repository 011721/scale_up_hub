name: scale_up_hub
description: SCALE UP HUB by Viseal - Offline First ERP
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Base de données
  drift: ^2.14.0
  sqlite3_flutter_libs: ^0.5.18
  path_provider: ^2.1.0
  path: ^1.9.0

  # Sécurité
  flutter_secure_storage: ^9.0.0
  crypto: ^3.0.3
  encrypt: ^5.0.3

  # Navigation & État
  go_router: ^13.0.0
  flutter_riverpod: ^2.4.9

  # UI
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.7
  drift_dev: ^2.14.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo_viseal.png
